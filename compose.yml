services:
  llm-gemma4:
    profiles: ["local-llm"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MOLT_GEMMA4_PORT:-8080}:8080"
    command:
      - -m
      - /models/${MOLT_GEMMA4_MODEL_FILE:-gemma-4-e4b-q4.gguf}
      - --alias
      - ${MOLT_GEMMA4_ALIAS:-gemma-4-e4b}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "${MOLT_GEMMA4_CTX_SIZE:-32768}"
      - --parallel
      - "${MOLT_GEMMA4_PARALLEL:-1}"
      - --jinja
      - --api-key
      - ${MOLT_GEMMA4_API_KEY:-local-dev-key}
      - --metrics
        #- --chat-template-kwargs
        #- '{"enable_thinking":false}'
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
